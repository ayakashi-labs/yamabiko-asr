name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  stable:
    name: Stable
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-pc-windows-msvc

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run default tests
        run: cargo test --locked --all-targets

      - name: Run general provider tests
        run: cargo test --locked --all-targets --features "directml,onednn,openvino,qnn,vitis,xnnpack,serde"

      - name: Run CUDA and TensorRT tests
        run: cargo test --locked --all-targets --features "tensorrt,serde"

      - name: Run TensorRT RTX tests
        run: cargo test --locked --all-targets --features "nvrtx,serde"

      - name: Run WebGPU tests
        run: cargo test --locked --all-targets --features "webgpu,serde"

      - name: Link-check custom dynamic providers
        run: cargo test --locked --all-targets --no-run --features "tvm,serde"

      - name: Check Windows ARM64 providers
        run: cargo check --locked --target aarch64-pc-windows-msvc --features "qnn,xnnpack,serde"

      - name: Run documentation tests
        run: cargo test --locked --doc --all-features

      - name: Check package contents
        run: cargo package --locked

  msrv:
    name: MSRV 1.88.0
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust 1.88.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0

      - name: Run tests
        run: cargo test --locked --all-targets

      - name: Check all features
        run: cargo check --locked --all-targets --all-features
